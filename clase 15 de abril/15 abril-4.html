<html>
<body>

<script>
// declarar un array con valores numéricos y enteros,
// visualizar si el array esta ordenado ascendentemente si o no

function Proceso(tab_numeros){
    let salir = 0; i=0; ordenado="si";
    while (salir == 0){
        if (i == tab_numeros.length){
            salir = 1
        }  else  {
            if (tab_numeros[i] > tab_numeros[i+1]){
                ordenado="no";
                salir=1
            } else{
                i++;
            }
        }
    }
    return ordenado;
    }


function Visualizar(dato){
    if (dato == "si"){
        alert ( "el array esta ordenado")
    } else{
        alert ( "el array no esta ordenado")
    }
}
tabla_numeros=[2,3,4,10,20,40]
Visualizar(Proceso (tabla_numeros));


</script>

</body>
</html>
