
<html>
<body>

<script>
// pedir notas por teclado, si es -99 dejar de pedirlas y hacer una media de todas las notas
function Proceso(){
    let sw = 0
    let suma = 0;
    let contador = 0;
      while ( sw == 0){
      let nota = parseInt(prompt("Introduce una nota ):"));
    if (nota != -99){
            suma += nota;
            contador++;
        }
else {
sw = 1
}
      }
    let total = suma / contador;

    return total
}



function Visualizar(resultado){
    document.write("La media es: " + resultado);
}

// Programa principal
let resul = Proceso();
Visualizar(resul);

</script>

</body>
</html>
