<script>
// Visualizar numeros del 1 en adelante hasta que el numero introducido sea superior a 10 y multiplo a 7, 
function Visualizar (){
    let sw = 0, conta=10; 
    while ( sw ==0){
        if (conta % 7 == 0 && conta > 10){
            sw = 1;
        
        } else {
            document.write (conta)
            conta+=1;

       
        }
    }
}


//programa principal --
Visualizar()


</script>
