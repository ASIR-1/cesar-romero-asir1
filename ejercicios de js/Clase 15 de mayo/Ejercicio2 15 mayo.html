<!DOCTYPE html>
<html>

<head>
    <title>Ejemplo de JavaScript</title>
    <meta charset="UTF-8">
</head>

<body>
<p id="resultado"></p>
    <form>
            <p>Ingresa un numero<input type="number" id="n1"></p>
            <p>Ingresa un numero<input type="number" id="n2"></p>
            <p>Ingresa un numero<input type="number" id="n3"></p>
            <p>Ingresa un numero<input type="number" id="n4"></p>
            <p>Ingresa un numero<input type="number" id="n5"></p>
            <p>Ingresa un numero<input type="number" id="n6"></p>
            <p>Ingresa un numero<input type="number" id="n7"></p>
            <p>Ingresa un numero<input type="number" id="n8"></p>
        <input type="button" onClick="sumar()" value="sumar">
    </form>

    <script>
        //pedir dos números en un formulario, visualizar su suma
        function sumar() {
            let suma = 0;
           for (let i = 1; i<=8; i++){
            suma += parseFloat(document.getElementById("n" + i).value) || 0
           }
           document.getElementByID("resultado".innerHTML = suma);
        }
    </script>

</body>

</html>
