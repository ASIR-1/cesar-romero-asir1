<!DOCTYPE html>

<body>

<script>
    // pedir numeros al usuario hasta que se ponga -99, cuando se ponga ese numero mostrar el mayor de los
    //números introducidos
function Proceso(){
    sw =0; mayor =-9999
    while (sw == 0){
        numero=parseInt(prompt("Deme numero: "))
        if (numero == -99){
            sw = 1;
        } else {
            if (numero > mayor){
                mayor = numero;
            }
        }
    }
    return mayor
}
function Visualizar(dato){
    alert ("el mayor es " + dato);
}
//programa principal
resul = Proceso ()
Visualizar (resul)

</script>
</body>
</html>
