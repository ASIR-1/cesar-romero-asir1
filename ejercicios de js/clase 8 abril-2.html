<script>
//declarar un array con las distintas notas de un alumno y calcular su media de notas
function Proceso(tabla_notas){
    let conta = 0, suma =0;
    for (i=0; i < tabla_notas.length; i++){
        if (tabla_notas[i] >=5){
            conta++
            suma += tab_notas[i]

        }
    }
    media = suma / conta
    return media
}

function Visualizar(dato){
    alert ( "la media es: "+dato)
}








//programa principal --

let tab_notas=[3,4,5,6,5,6,8,3,9]
resul = Proceso (tab_notas);

Visualizar (resul);
</script>
