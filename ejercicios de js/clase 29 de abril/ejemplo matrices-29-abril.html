<script>
// calcular el sueldo de cada persona



function Visualizar(mat_sueldos){
for (i = 0; i < mat_sueldos.length; i++){
    suma = 0; conta=0;
    for (k = 1; k < mat_sueldos[i].length; k++){
        suma = suma + mat_sueldos[i][k];
        conta ++
    }
       alert (mat_sueldos[i][0] + " cobra " +suma + " y su media de salario es  " +suma/(conta))
    }

}











//programa prnicipal
mat_sueldos = [
    ["pepe",1000,2000,2000],
    ["ana",2000,4000],
    ["Manuel",1000,5000,300]
];
Visualizar(mat_sueldos)
</script>
