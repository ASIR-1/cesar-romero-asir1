<script>
// 13.-) Declarar una lista o arrays bidimensional, 
// con varias sublistas que contenga
// valores numéricos enteros. Visualizar la suma 
// de los valores de cada sublista, por ejemplo:
// lista : (1,1,2,3,4), (2,2,2),(3,3,3),(4,4,4)
// La solución es: 11 (primera sublista), 6 (segunda sublista) , 9 y 12



function Visualizar(lista){

    for (let i = 0; i<lista.length; i++){
       let suma = 0
        for (let k = 0; k<lista[i].length; k++){
            suma += lista[i][k]
        }
        alert("total de la sublista "+ (i+1)+": "+suma);
    }

}






//programa principal
let lista=[
    [1,1,2,3,4],
    [2,2,2],
    [3,3,3],
    [4,4,4]
];
Visualizar(lista)


</script>
